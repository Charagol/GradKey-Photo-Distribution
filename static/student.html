<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>毕业季专属相册</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in': 'fadeIn 0.4s ease-out',
                        'slide-up': 'slideUp 0.4s ease-out',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(12px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                    },
                },
            },
        }
    </script>
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

<!-- =========================================================================
     Login Overlay
     ========================================================================= -->
<div id="login-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/70 backdrop-blur-sm p-4">
    <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-sm animate-fade-in">
        <div class="text-center mb-6">
            <div class="text-5xl mb-3">🎓</div>
            <h1 class="text-2xl font-bold text-gray-900">毕业季专属相册</h1>
            <p class="text-sm text-gray-400 mt-1">请输入你的专属凭证</p>
        </div>

        <div class="space-y-3">
            <input
                id="login-album-pw"
                type="password"
                placeholder="相册密码"
                autocomplete="off"
                class="w-full px-4 py-3 text-base border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-400 focus:border-transparent outline-none bg-gray-50"
            />
            <input
                id="login-name"
                type="text"
                placeholder="你的姓名"
                autocomplete="off"
                class="w-full px-4 py-3 text-base border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-400 focus:border-transparent outline-none bg-gray-50"
            />
            <input
                id="login-secret"
                type="text"
                placeholder="个人密钥（6位）"
                autocomplete="off"
                maxlength="6"
                class="w-full px-4 py-3 text-base border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-400 focus:border-transparent outline-none bg-gray-50 font-mono tracking-widest text-center"
            />
        </div>

        <button
            id="login-btn"
            class="w-full mt-5 py-3 bg-indigo-600 hover:bg-indigo-700 active:bg-indigo-800 text-white font-semibold rounded-xl transition-colors text-lg"
        >
            登 录
        </button>

        <p id="login-error" class="text-red-500 text-sm text-center mt-3 hidden"></p>
    </div>
</div>

<!-- =========================================================================
     Main App
     ========================================================================= -->
<div id="main-app" class="hidden min-h-screen">

    <!-- Navbar -->
    <nav id="navbar" class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-gray-100 shadow-sm">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-2 min-w-0">
                <span class="text-xl flex-shrink-0">🎓</span>
                <h1 class="font-bold text-lg text-gray-900 truncate">毕业季相册</h1>
                <span id="student-name-display" class="text-sm text-gray-400 hidden sm:inline truncate"></span>
            </div>
            <div class="flex items-center gap-2 flex-shrink-0">
                <button id="logout-btn" class="text-sm text-gray-400 hover:text-red-500 hover:bg-red-50 px-3 py-1.5 rounded-lg transition-colors">
                    退出
                </button>
            </div>
        </div>
    </nav>

    <!-- Tag Filter Bar -->
    <div id="tag-filter-bar" class="sticky top-[49px] z-20 bg-white/70 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-6xl mx-auto px-4 py-3">
            <div id="tag-filter-list" class="flex gap-2 overflow-x-auto scrollbar-hide"></div>
        </div>
    </div>

    <!-- Multi-Select Bar (V3.0 Phase 3.3) -->
    <div id="multi-select-bar" class="hidden max-w-6xl mx-auto px-4">
        <div id="multi-select-bar-inner" class="py-2 flex items-center gap-3 border-b border-gray-100">
            <!-- Rendered by JS: renderMultiSelectBar() -->
        </div>
    </div>

    <!-- Photo Grid -->
    <div id="photo-grid-section" class="max-w-6xl mx-auto px-3 sm:px-4 py-4 sm:py-6">
        <p id="photos-empty" class="text-gray-400 text-center py-16 hidden">
            <span class="text-4xl block mb-3">📷</span>
            暂无你的专属照片
        </p>

        <div id="photo-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-2 sm:gap-3 lg:gap-4"></div>

        <p id="photos-filtered-empty" class="text-gray-400 text-center py-16 hidden">
            该标签下暂无照片
        </p>

        <!-- Bottom padding for selection bar -->
        <div id="selection-bar-spacer" class="hidden h-20"></div>
    </div>

    <!-- ================================================================ -->
    <!-- Selection Bar (visible in multi-select mode)                     -->
    <!-- ================================================================ -->
    <div id="selection-bar" class="hidden fixed bottom-0 inset-x-0 z-40 bg-white border-t border-gray-200 shadow-lg">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
            <div class="flex items-center gap-2">
                <button id="select-all-btn" class="text-sm text-indigo-600 hover:text-indigo-700 hover:bg-indigo-50 px-3 py-1.5 rounded-lg transition-colors font-medium">
                    全选
                </button>
                <button id="deselect-all-btn" class="text-sm text-gray-500 hover:text-gray-700 hover:bg-gray-100 px-3 py-1.5 rounded-lg transition-colors">
                    取消全选
                </button>
                <span id="selection-count" class="text-sm text-gray-600 ml-2 font-medium">已选 0 张</span>
            </div>
            <div class="flex items-center gap-2">
                <button id="download-selected-btn" class="text-sm bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg transition-colors font-medium disabled:opacity-50 disabled:cursor-not-allowed"
                        disabled>
                    下载选中
                </button>
                <button id="cancel-select-btn" class="text-sm text-gray-500 hover:text-gray-700 hover:bg-gray-100 px-3 py-1.5 rounded-lg transition-colors">
                    取消
                </button>
            </div>
        </div>
    </div>

    <!-- ================================================================ -->
    <!-- Download Progress Bar (visible during download)                  -->
    <!-- ================================================================ -->
    <div id="download-progress-bar" class="hidden fixed bottom-0 inset-x-0 z-50 bg-white border-t border-gray-200 shadow-lg">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-5 h-5 border-2 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                <span id="download-progress-text" class="text-sm text-gray-700 font-medium">准备下载...</span>
            </div>
            <button id="abort-download-btn" class="text-sm text-red-500 hover:text-red-700 hover:bg-red-50 px-3 py-1.5 rounded-lg transition-colors">
                中止
            </button>
        </div>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="fixed inset-0 z-50 bg-black/95 hidden flex items-center justify-center">
        <!-- Close -->
        <button id="lightbox-close" class="absolute top-3 right-3 sm:top-5 sm:right-5 z-10 w-10 h-10 flex items-center justify-center text-white/60 hover:text-white text-2xl font-light transition-colors rounded-full hover:bg-white/10">
            ✕
        </button>

        <!-- Prev -->
        <button id="lightbox-prev" class="absolute left-2 sm:left-4 top-1/2 -translate-y-1/2 z-10 w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center text-white/60 hover:text-white text-3xl sm:text-4xl font-light transition-colors rounded-full hover:bg-white/10 disabled:opacity-20 disabled:cursor-default">
            ‹
        </button>

        <!-- Image -->
        <img id="lightbox-img" src="" alt="" class="max-h-[85vh] max-w-[92vw] object-contain select-none animate-fade-in" />

        <!-- Next -->
        <button id="lightbox-next" class="absolute right-2 sm:right-4 top-1/2 -translate-y-1/2 z-10 w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center text-white/60 hover:text-white text-3xl sm:text-4xl font-light transition-colors rounded-full hover:bg-white/10 disabled:opacity-20 disabled:cursor-default">
            ›
        </button>

        <!-- V4.0: 引导文案 — 替代「查看原图」按钮，引导用户走向多选下载 -->
        <p class="absolute bottom-10 left-1/2 -translate-x-1/2 text-white/30 text-xs text-center">如需要高清原图，请使用多选下载功能</p>

        <!-- Counter -->
        <span id="lightbox-counter" class="absolute bottom-4 left-1/2 -translate-x-1/2 text-white/50 text-sm font-mono"></span>
    </div>
</div>

<!-- =========================================================================
     Toast Container
     ========================================================================= -->
<div id="toast-container" class="fixed bottom-6 right-6 z-[100] flex flex-col gap-2"></div>

<script src="/static/js/student.js"></script>
</body>
</html>
